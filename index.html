<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<link rel="manifest" href="manifest.webmanifest" />
<title>PokeRod</title>
<link rel="stylesheet" href="styles.css?v=86" />
</head>
<body>
  <div id="app">
    <div id="screen">
      <canvas id="game" width="480" height="320"></canvas>
      <div id="title" class="overlay">
        <div class="stars" aria-hidden="true"></div>
        <div class="tufts" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="rays" aria-hidden="true"></div>
        <h1 class="logo" aria-label="PokeRod">
          <span style="--i:0">P</span><span style="--i:1">o</span><span style="--i:2">k</span><span style="--i:3">e</span><span class="rod"><span style="--i:4">R</span><span style="--i:5">o</span><span style="--i:6">d</span></span>
        </h1>
        <p class="sub">A creature-collecting adventure</p>
        <div class="cta">
          <button id="btn-new">NEW GAME</button>
          <button id="btn-continue" hidden>CONTINUE</button>
        </div>
        <p class="press">- PRESS START -</p>
        <p class="hint">Arrows / WASD to move &middot; Z = A &middot; X = B &middot; Shift = Select &middot; Enter = Start</p>
      </div>
    </div>
    <div id="touch" aria-hidden="true">
      <div id="dpad">
        <button class="dbtn" data-key="ArrowUp" aria-label="Up">▲</button>
        <button class="dbtn" data-key="ArrowLeft" aria-label="Left">◀</button>
        <button class="dbtn" data-key="ArrowRight" aria-label="Right">▶</button>
        <button class="dbtn" data-key="ArrowDown" aria-label="Down">▼</button>
      </div>
      <div id="startsel">
        <button class="ssbtn" data-key="Shift" aria-label="Select">SELECT</button>
        <button class="ssbtn" data-key="Enter" aria-label="Start">START</button>
      </div>
      <div id="abuttons">
        <button class="abtn" data-key="x" aria-label="B">B</button>
        <button class="abtn" data-key="z" aria-label="A">A</button>
      </div>
    </div>
    <div id="version" aria-hidden="true"></div>
  </div>
  <script src="js/data.js?v=86"></script>
  <script src="js/maps.js?v=86"></script>
  <script src="js/atlas.js?v=86"></script>
  <script src="js/sprites.js?v=86"></script>
  <script src="js/sprites_chars.js?v=86"></script>
  <script src="js/sprites_mons.js?v=86"></script>
  <script src="js/input.js?v=86"></script>
  <script src="js/ui.js?v=86"></script>
  <script src="js/world.js?v=86"></script>
  <script src="js/battle.js?v=86"></script>
  <script src="js/save.js?v=86"></script>
  <script src="js/audio.js?v=86"></script>
  <script src="js/audio_sfx.js?v=86"></script>
  <script src="js/audio_music.js?v=86"></script>
  <script src="js/chatter.js?v=86"></script>
  <script src="js/items.js?v=86"></script>
  <script src="js/quests.js?v=86"></script>
  <script src="js/shop.js?v=86"></script>
  <script src="js/game.js?v=86"></script>
</body>
</html>
