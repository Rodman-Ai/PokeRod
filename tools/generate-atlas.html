<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PokeRod Atlas Generator</title>
<style>
  body { font-family: ui-monospace, Menlo, monospace; background: #1a1a1a; color: #e0e0e0; padding: 16px; }
  h1 { font-size: 16px; margin: 0 0 12px; }
  .row { display: flex; gap: 12px; margin: 8px 0; flex-wrap: wrap; align-items: center; }
  button { background: #3060a0; color: white; border: 0; padding: 8px 14px; cursor: pointer; font-family: inherit; }
  button:hover { background: #4080d0; }
  button:disabled { background: #555; }
  pre { background: #0e0e0e; padding: 8px; overflow: auto; max-height: 240px; font-size: 11px; }
  canvas#atlas { background: #2a2a2a; image-rendering: pixelated; image-rendering: crisp-edges; border: 1px solid #444; max-width: 100%; }
  .note { color: #aaa; font-size: 12px; }
</style>
</head>
<body>

<h1>PokeRod Atlas Generator</h1>
<p class="note">Renders every tile, character frame, and creature into a packed PNG sheet plus a JSON layout, and emits per-asset PNGs for individual editing/regeneration.</p>

<div class="row">
  <label>Style <select id="style"></select></label>
  <button id="run">Generate</button>
  <button id="dl-atlas" disabled>Download atlas.png</button>
  <button id="dl-json" disabled>Download atlas.json</button>
  <button id="dl-zip" disabled>Download per-asset PNGs (.zip-like text manifest)</button>
  <span id="status">Idle.</span>
</div>

<canvas id="atlas" width="512" height="1024"></canvas>

<h2 style="font-size:14px;">atlas.json (preview)</h2>
<pre id="json-preview">(generate to populate)</pre>

<!-- Game data + the ORIGINAL procedural creature renderer (saved as
     tools/_sprites_mons_proc.js). We bypass the runtime sprites.js /
     sprites_chars.js / sprites_mons.js because those now delegate to the
     atlas we're building - chicken-and-egg. The atlas-art.js module is
     fully self-contained for tile + character rendering. -->
<script src="../js/data.js"></script>
<script src="_sprites_mons_proc.js"></script>

<!-- The atlas art module (this defines window.PR_ATLAS_ART). -->
<script src="atlas-art.js"></script>

<script>
'use strict';

// Atlas layout: a fixed-width grid that's easy for image generators to
// preserve. Tiles in 32px cells, characters in 32px cells, creatures in
// 64px cells. Sections are stacked vertically.
const COLS = 16; // 16 cells across
const TILE_PX = 32;
const CREATURE_PX = 64;
const GRID_PX = 1;
const GRID_COLOR = '#ff00ff';

let artRegistered = false;
let lastResult = null;

function stylePresets() {
  return (window.PR_ATLAS_ART && window.PR_ATLAS_ART.STYLE_PRESETS) || [
    { id:'gba_firered', label:'GBA FIRERED', image:'atlas.png', json:'atlas.json', spritesDir:'sprites' }
  ];
}

function styleById(styleId) {
  const styles = stylePresets();
  return styles.find((s) => s.id === styleId) || styles.find((s) => s.id === 'gba_firered') || styles[0];
}

function makeOut(style) {
  return {
    frames: {},
    image: style.image || 'atlas.png',
    style: { id: style.id, label: style.label },
    tile_size: TILE_PX,
    creature_size: CREATURE_PX
  };
}

function setStatus(s) { document.getElementById('status').textContent = s; }

function sectionSize(rows, cellH) {
  return rows * cellH + Math.max(0, rows - 1) * GRID_PX;
}

function sectionWidth(colsPerRow, cellW) {
  return colsPerRow * cellW + Math.max(0, colsPerRow - 1) * GRID_PX;
}

function drawSection(items, cellW, cellH, colsPerRow, startY, ctx, out) {
  let i = 0;
  for (const item of items) {
    const col = i % colsPerRow;
    const row = (i / colsPerRow) | 0;
    const px = col * cellW;
    const py = startY + row * cellH;
    item.draw(ctx, px, py);
    out.frames[item.key] = { x: px, y: py, w: cellW, h: cellH };
    i++;
  }
  // Return the y position right after this section.
  const rowsUsed = Math.ceil(items.length / colsPerRow);
  return startY + rowsUsed * cellH;
}

function mapSectionFrames(items, cellW, cellH, colsPerRow, startY, out) {
  let i = 0;
  for (const item of items) {
    const col = i % colsPerRow;
    const row = (i / colsPerRow) | 0;
    const px = col * (cellW + GRID_PX);
    const py = startY + row * (cellH + GRID_PX);
    out.frames[item.key] = { x: px, y: py, w: cellW, h: cellH };
    i++;
  }
  const rowsUsed = Math.ceil(items.length / colsPerRow);
  return startY + sectionSize(rowsUsed, cellH);
}

function drawEditorGrid(ctx, sections, totalW) {
  ctx.fillStyle = GRID_COLOR;
  for (const section of sections) {
    const h = sectionSize(section.rows, section.cellH);
    const w = sectionWidth(section.cols, section.cellW);
    for (let col = 1; col < section.cols; col++) {
      const x = col * (section.cellW + GRID_PX) - GRID_PX;
      ctx.fillRect(x, section.y, GRID_PX, h);
    }
    for (let row = 1; row < section.rows; row++) {
      const y = section.y + row * (section.cellH + GRID_PX) - GRID_PX;
      ctx.fillRect(0, y, w, GRID_PX);
    }
  }
  for (let i = 0; i < sections.length - 1; i++) {
    const y = sections[i].y + sectionSize(sections[i].rows, sections[i].cellH);
    ctx.fillRect(0, y, totalW, GRID_PX);
  }
}

function snapshotAssets(ctx, frames) {
  const perAssetPNGs = {};
  for (const [key, f] of Object.entries(frames)) {
    const off = document.createElement('canvas');
    off.width = f.w; off.height = f.h;
    off.getContext('2d').drawImage(ctx.canvas, f.x, f.y, f.w, f.h, 0, 0, f.w, f.h);
    perAssetPNGs[key] = off.toDataURL('image/png');
  }
  return perAssetPNGs;
}

function ensureArtRegistered(A) {
  if (artRegistered) return;
  A.registerCharacters();
  A.registerCreatures();
  artRegistered = true;
}

async function generate(styleId, headlessSnapshots) {
  const A = window.PR_ATLAS_ART;
  const style = styleById(styleId);
  setStatus('Generating ' + style.label + '...');
  // Register characters + creatures (creatures need PR_DATA already loaded).
  ensureArtRegistered(A);
  const out = makeOut(style);

  // Compute total height needed.
  const tileRows = Math.ceil(A.TILES.length / COLS);
  const charRows = Math.ceil(A.CHARS.length / COLS);
  const creatureCols = 8;
  const creatureRows = Math.ceil(A.CREATURES.length / creatureCols);
  const tightTotalH = tileRows * TILE_PX + charRows * TILE_PX + creatureRows * CREATURE_PX;
  const tightTotalW = Math.max(COLS * TILE_PX, creatureCols * CREATURE_PX);
  const totalH = sectionSize(tileRows, TILE_PX) + GRID_PX +
    sectionSize(charRows, TILE_PX) + GRID_PX +
    sectionSize(creatureRows, CREATURE_PX);
  const totalW = Math.max(sectionWidth(COLS, TILE_PX), sectionWidth(creatureCols, CREATURE_PX));

  const sourceCanvas = document.createElement('canvas');
  sourceCanvas.width = tightTotalW;
  sourceCanvas.height = tightTotalH;
  const sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
  sourceCtx.imageSmoothingEnabled = false;
  sourceCtx.clearRect(0, 0, tightTotalW, tightTotalH);
  const source = makeOut(style);

  let sy = 0;
  sy = drawSection(A.TILES, TILE_PX, TILE_PX, COLS, sy, sourceCtx, source);
  sy = drawSection(A.CHARS, TILE_PX, TILE_PX, COLS, sy, sourceCtx, source);
  sy = drawSection(A.CREATURES, CREATURE_PX, CREATURE_PX, creatureCols, sy, sourceCtx, source);
  if (A.applyAtlasStyle) A.applyAtlasStyle(sourceCtx, style.id, 0, 0, tightTotalW, tightTotalH);

  const canvas = document.getElementById('atlas');
  canvas.width = totalW;
  canvas.height = totalH;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, totalW, totalH);

  // Reset frames.
  out.frames = {};

  // Section 1: TILES (32x32, 16 across).
  let y = 0;
  const sections = [];
  sections.push({ y, rows:tileRows, cellW:TILE_PX, cellH:TILE_PX, cols:COLS });
  y = mapSectionFrames(A.TILES, TILE_PX, TILE_PX, COLS, y, out);
  y += GRID_PX;
  // Section 2: CHARACTERS (32x32, 16 across).
  sections.push({ y, rows:charRows, cellW:TILE_PX, cellH:TILE_PX, cols:COLS });
  y = mapSectionFrames(A.CHARS, TILE_PX, TILE_PX, COLS, y, out);
  y += GRID_PX;
  // Section 3: CREATURES (64x64, 8 across).
  sections.push({ y, rows:creatureRows, cellW:CREATURE_PX, cellH:CREATURE_PX, cols:creatureCols });
  y = mapSectionFrames(A.CREATURES, CREATURE_PX, CREATURE_PX, creatureCols, y, out);

  for (const [key, f] of Object.entries(out.frames)) {
    const src = source.frames[key];
    ctx.drawImage(sourceCanvas, src.x, src.y, src.w, src.h, f.x, f.y, f.w, f.h);
  }
  drawEditorGrid(ctx, sections, totalW);

  // Also inject a code->key map for tiles so the runtime can resolve tile codes.
  const tileCodeMap = {};
  for (const t of A.TILES) {
    if (t.code && !t.variantFor) tileCodeMap[t.code] = t.key;
  }
  out.tile_code_to_key = tileCodeMap;
  out.tile_variants = A.TILE_VARIANTS || {};

  document.getElementById('json-preview').textContent =
    JSON.stringify(out, null, 2).slice(0, 3500) + '\n... (truncated for preview)';

  document.getElementById('dl-atlas').disabled = false;
  document.getElementById('dl-json').disabled = false;
  document.getElementById('dl-zip').disabled = false;

  const perAssetPNGs = headlessSnapshots ? snapshotAssets(ctx, out.frames) : {};
  lastResult = { style, canvas, json: out, perAssetPNGs };
  setStatus('Generated ' + style.label + '. Tiles=' + A.TILES.length + '  Chars=' + A.CHARS.length + '  Creatures=' + A.CREATURES.length + '  AtlasSize=' + totalW + 'x' + totalH);
  return lastResult;
}

function download(name, dataUrl) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

const styleSelect = document.getElementById('style');
for (const style of stylePresets()) {
  const opt = document.createElement('option');
  opt.value = style.id;
  opt.textContent = style.label;
  if (style.id === 'gba_firered') opt.selected = true;
  styleSelect.appendChild(opt);
}

document.getElementById('run').addEventListener('click', () => generate(styleSelect.value, true));
document.getElementById('dl-atlas').addEventListener('click', () => {
  const style = lastResult && lastResult.style || styleById(styleSelect.value);
  download(style.image || 'atlas.png', document.getElementById('atlas').toDataURL('image/png'));
});
document.getElementById('dl-json').addEventListener('click', () => {
  const style = lastResult && lastResult.style || styleById(styleSelect.value);
  const json = lastResult ? lastResult.json : makeOut(style);
  download(style.json || 'atlas.json', 'data:application/json,' + encodeURIComponent(JSON.stringify(json, null, 2)));
});
document.getElementById('dl-zip').addEventListener('click', () => {
  // Emit a manifest of base64 PNGs the user can split externally.
  let manifest = '';
  for (const [k, v] of Object.entries((lastResult && lastResult.perAssetPNGs) || {})) manifest += k + '\t' + v + '\n';
  download('atlas-sprites.txt', 'data:text/plain,' + encodeURIComponent(manifest));
});

// Headless API: window.__pokerodGenerate() resolves with all artifacts
// as data URLs / strings. Used by tools/run-generator.js (Playwright).
window.__pokerodGenerate = async function (styleId) {
  const r = await generate(styleId || 'gba_firered', true);
  return {
    style: r.style,
    atlasPng: r.canvas.toDataURL('image/png'),
    atlasJson: JSON.stringify(r.json, null, 2),
    perAssetPNGs: r.perAssetPNGs,
    width: r.canvas.width,
    height: r.canvas.height,
    counts: {
      tiles: r.json && Object.keys(r.json.tile_code_to_key || {}).length,
      total: r.json && Object.keys(r.json.frames || {}).length
    }
  };
};

window.__pokerodGenerateAll = async function () {
  const results = [];
  for (const style of stylePresets()) {
    const r = await window.__pokerodGenerate(style.id);
    results.push(r);
  }
  return results;
};
</script>

</body>
</html>
